<!DOCTYPE html>
<html lang="en">
<head>

<title>Career Guidance Placement Prediction</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Placement Prediction System</h1>

</form>

</div>

</body>
</html>
